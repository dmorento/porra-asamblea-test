document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

height: 1em; width: 1em; margin: 0 .06em 0 .05em; vertical-align: -0.12em; display: inline-block; }\n    @keyframes liveblink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0.28; } }\n\n    /* ===== Campo cenital animado (decorativo) ===== */\n    .pitch-layer { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }\n    .pitch-lines { position: absolute; inset: 2.5vmin; border: 3px solid rgba(255,255,255,0.20); }\n    .pl-half { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: rgba(255,255,255,0.20); transform: translateX(-1.5px); }\n    .pl-circle { position: absolute; left: 50%; top: 50%; width: 22vmin; height: 22vmin; border: 3px solid rgba(255,255,255,0.20); border-radius: 50%; transform: translate(-50%,-50%); }\n    .pl-spot { position: absolute; left: 50%; top: 50%; width: 1.1vmin; height: 1.1vmin; background: rgba(255,255,255,0.28); border-radius: 50%; transform: translate(-50%,-50%); }\n    .pl-box { position: absolute; top: 50%; width: 12vmin; height: 40vmin; border: 3px solid rgba(255,255,255,0.20); transform: translateY(-50%); }\n    .pl-box.left { left: 2.5vmin; border-left: none; }\n    .pl-box.right { right: 2.5vmin; border-right: none; }\n    .pl-goal { position: absolute; top: 50%; width: 5vmin; height: 20vmin; border: 3px solid rgba(255,255,255,0.20); transform: translateY(-50%); }\n    .pl-goal.left { left: 2.5vmin; border-left: none; }\n    .pl-goal.right { right: 2.5vmin; border-right: none; }\n\n    /* jugadores estilo 90s (vista cenital) */\n    .plyr { position: absolute; width: 2.6vmin; height: 2.6vmin; min-width: 16px; min-height: 16px; will-change: transform; }\n    .plyr .shadow { position: absolute; left: 18%; top: 55%; width: 80%; height: 55%; background: rgba(0,0,0,0.28); border-radius: 50%; filter: blur(1px); }\n    .plyr .shirt { position: absolute; inset: 0; border-radius: 50%; border: 2px solid rgba(0,0,0,0.55); box-sizing: border-box; }\n    .plyr .head { position: absolute; left: 50%; top: 50%; width: 42%; height: 42%; background: #e8b98a; border: 1.5px solid rgba(0,0,0,0.5); border-radius: 50%; transform: translate(-50%,-50%); }\n    .t-red .shirt { background: #e0452c; }\n    .t-blue .shirt { background: #2a6fdb; }\n    .t-gkr .shirt { background: #ffd23f; }\n    .ball { position: absolute; width: 1.7vmin; height: 1.7vmin; min-width: 11px; min-height: 11px; background: #fff; border: 1.5px solid #111; border-radius: 50%; box-shadow: 0 0 0 1px rgba(0,0,0,0.15); will-change: transform; }\n    .ball::after { content: ''; position: absolute; left: 30%; top: 28%; width: 22%; height: 22%; background: #111; border-radius: 50%; }\n\n    /* fichas-foto de los amigos (vista cenital) */\n    .friend { position: absolute; width: 5vmin; height: 5vmin; min-width: 38px; min-height: 38px; will-change: transform; }\n    .friend .shadow { position: absolute; left: 12%; top: 72%; width: 76%; height: 40%; background: rgba(0,0,0,0.30); border-radius: 50%; filter: blur(1.5px); }\n    .friend .tok { position: absolute; inset: 0; border-radius: 50%; border: 2.5px solid #f2ead8; box-shadow: 0 3px 7px rgba(0,0,0,0.4); background-color: #0b5226; background-size: cover; background-position: 50% 16%; will-change: transform; animation: wob 2.4s ease-in-out infinite; }\n    .friend .name { position: absolute; left: 50%; top: 100%; transform: translateX(-50%); margin-top: 2px; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 9px; letter-spacing: 0.5px; color: #f2ead8; text-shadow: 0 1px 2px rgba(0,0,0,0.8); white-space: nowrap; }\n    @keyframes wob { 0%,100% { transform: rotate(-7deg); } 50% { transform: rotate(7deg); } }\n\n    /* modo ver-campo: paneles transparentes para apreciar el fondo */\n    .main-wrap.xray > *:not(.pitch-layer):not(.xray-keep) { opacity: 0.06; transition: opacity .35s ease; pointer-events: none; }\n    .main-wrap > *:not(.pitch-layer):not(.xray-keep) { transition: opacity .35s ease; }\n\n    /* semicírculo del área (arco de penalti) */\n    .pl-arc { position: absolute; top: 50%; height: 15vmin; width: 5vmin; border: 3px solid rgba(255,255,255,0.20); transform: translateY(-50%); }\n    .pl-arc.left { left: calc(2.5vmin + 12vmin); border-left: none; border-radius: 0 100% 100% 0 / 0 50% 50% 0; }\n    .pl-arc.right { right: calc(2.5vmin + 12vmin); border-right: none; border-radius: 100% 0 0 100% / 50% 0 0 50%; }\n\n    /* carreras estilo jugador: sobre todo de atrás hacia delante (horizontal), dentro del campo */\n    @keyframes run1 { 0% { transform: translate(0,0); } 25% { transform: translate(7vw,2vh); } 50% { transform: translate(0,0); } 75% { transform: translate(-7vw,-2vh); } 100% { transform: translate(0,0); } }\n    @keyframes run2 { 0% { transform: translate(0,0); } 25% { transform: translate(-6vw,-2vh); } 50% { transform: translate(0,0); } 75% { transform: translate(6vw,2vh); } 100% { transform: translate(0,0); } }\n    @keyframes run3 { 0% { transform: translate(0,0); } 30% { transform: translate(8vw,-2vh); } 55% { transform: translate(2vw,3vh); } 80% { transform: translate(-6vw,-1vh); } 100% { transform: translate(0,0); } }\n    @keyframes run4 { 0% { transform: translate(0,0); } 25% { transform: translate(-8vw,2vh); } 50% { transform: translate(0,0); } 75% { transform: translate(5vw,-2vh); } 100% { transform: translate(0,0); } }\n    @keyframes runGK { 0% { transform: translate(0,0); } 50% { transform: translate(3vw,5vh); } 100% { transform: translate(0,0); } }\n    @keyframes ballrun { 0% { transform: translate(0,0); } 20% { transform: translate(10vw,-3vh); } 45% { transform: translate(-8vw,3vh); } 70% { transform: translate(7vw,4vh); } 100% { transform: translate(0,0); } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div class=\"main-wrap {{ xrayClass }}\" style=\"min-height:100vh; padding:20px 14px 60px; display:flex; flex-direction:column; align-items:center; gap:18px;\">\n\n  <!-- BOTÓN VER CAMPO -->\n  <button class=\"xray-keep\" onclick=\"{{ toggleXray }}\" style=\"position:fixed; bottom:16px; right:16px; z-index:40; background:{{ xrayBtnBg }}; color:{{ xrayBtnFg }}; border:3px solid #111; box-shadow:4px 4px 0 #111; padding:9px 14px; font-family:'Archivo Black',sans-serif; font-size:12px; cursor:pointer; text-transform:uppercase; letter-spacing:0.5px;\">{{ xrayLabel }}<\u002Fbutton>\n\n  <!-- CAMPO CENITAL ANIMADO -->\n  <div class=\"pitch-layer\" aria-hidden=\"true\">\n    <div class=\"pitch-lines\"><\u002Fdiv>\n    <div class=\"pl-half\"><\u002Fdiv>\n    <div class=\"pl-circle\"><\u002Fdiv>\n    <div class=\"pl-spot\"><\u002Fdiv>\n    <div class=\"pl-box left\"><\u002Fdiv>\n    <div class=\"pl-box right\"><\u002Fdiv>\n    <div class=\"pl-goal left\"><\u002Fdiv>\n    <div class=\"pl-goal right\"><\u002Fdiv>\n    <div class=\"pl-arc left\"><\u002Fdiv>\n    <div class=\"pl-arc right\"><\u002Fdiv>\n\n    <!-- fichas-foto: carreras de atrás hacia delante, dentro del campo -->\n    <div class=\"friend\" style=\"left:8%; top:47%; animation:runGK 15s ease-in-out infinite;\"><div class=\"shadow\"><\u002Fdiv><div class=\"tok\" style=\"background-image:url(&quot;15365dd8-fe4c-4f5a-a7fd-3516d729aae3&quot;); animation-duration:2.1s;\"><\u002Fdiv><div class=\"name\">JORGE<\u002Fdiv><\u002Fdiv>\n    <div class=\"friend\" style=\"left:20%; top:20%; animation:run1 16s ease-in-out infinite;\"><div class=\"shadow\"><\u002Fdiv><div class=\"tok\" style=\"background-image:url(&quot;7a721a1d-e710-4f1b-8e7f-c853f0d77c06&quot;); animation-duration:2.6s;\"><\u002Fdiv><div class=\"name\">ANNE<\u002Fdiv><\u002Fdiv>\n    <div class=\"friend\" style=\"left:23%; top:68%; animation:run2 18s ease-in-out infinite; animation-delay:-3s;\"><div class=\"shadow\"><\u002Fdiv><div class=\"tok\" style=\"background-image:url(&quot;ca8bd34d-a028-435b-8f7a-674202ce0b6d&quot;); animation-duration:2.8s;\"><\u002Fdiv><div class=\"name\">ELENA<\u002Fdiv><\u002Fdiv>\n    <div class=\"friend\" style=\"left:34%; top:44%; animation:run3 17s ease-in-out infinite; animation-delay:-6s;\"><div class=\"shadow\"><\u002Fdiv><div class=\"tok\" style=\"background-image:url(&quot;89cbeff2-ccd2-44f4-9031-11f021076e32&quot;); animation-duration:2.3s;\"><\u002Fdiv><div class=\"name\">ANYA<\u002Fdiv><\u002Fdiv>\n    <div class=\"friend\" style=\"left:30%; top:84%; animation:run4 15.5s ease-in-out infinite;\"><div class=\"shadow\"><\u002Fdiv><div class=\"tok\" style=\"background-image:url(&quot;e8a465be-ff60-4871-95fc-d05366cc9e71&quot;); animation-duration:2.2s;\"><\u002Fdiv><div class=\"name\">DENIS<\u002Fdiv><\u002Fdiv>\n    <div class=\"friend\" style=\"left:66%; top:22%; animation:run2 16.5s ease-in-out infinite; animation-delay:-4s;\"><div class=\"shadow\"><\u002Fdiv><div class=\"tok\" style=\"background-image:url(&quot;90b325c9-f299-46ce-ba9f-6419a60a8579&quot;); animation-duration:2.5s;\"><\u002Fdiv><div class=\"name\">ANA<\u002Fdiv><\u002Fdiv>\n    <div class=\"friend\" style=\"left:70%; top:70%; animation:run1 18.5s ease-in-out infinite; animation-delay:-7s;\"><div class=\"shadow\"><\u002Fdiv><div class=\"tok\" style=\"background-image:url(&quot;34170f2e-e76d-4757-931d-bfc21e5595dd&quot;); animation-duration:2.7s;\"><\u002Fdiv><div class=\"name\">CLAUDIO<\u002Fdiv><\u002Fdiv>\n    <div class=\"friend\" style=\"left:78%; top:46%; animation:run3 15s ease-in-out infinite;\"><div class=\"shadow\"><\u002Fdiv><div class=\"tok\" style=\"background-image:url(&quot;69df2b15-088f-49d7-86b9-49812b8eea7b&quot;); animation-duration:2.0s;\"><\u002Fdiv><div class=\"name\">LOBATO<\u002Fdiv><\u002Fdiv>\n    <div class=\"friend\" style=\"left:82%; top:22%; animation:run4 17.5s ease-in-out infinite; animation-delay:-2s;\"><div class=\"shadow\"><\u002Fdiv><div class=\"tok\" style=\"background-image:url(&quot;446b5ad1-83a8-47a2-a5a2-23adbe08a245&quot;); animation-duration:2.9s;\"><\u002Fdiv><div class=\"name\">DANI<\u002Fdiv><\u002Fdiv>\n    <div class=\"ball\" style=\"left:49%; top:52%; animation:ballrun 12s ease-in-out infinite;\"><\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- MODAL RANKING GOLEADORES -->\n  <sc-if value=\"{{ rankingOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeRanking }}\" style=\"position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:50; display:flex; align-items:center; justify-content:center; padding:20px;\">\n      <div onclick=\"{{ stopProp }}\" style=\"background:#f2ead8; border:4px solid #111; box-shadow:8px 8px 0 #111; width:100%; max-width:440px; display:flex; flex-direction:column;\">\n        <div style=\"background:#111; color:#ffd23f; padding:14px 18px; display:flex; align-items:center; justify-content:space-between;\">\n          <div style=\"font-family:'Archivo Black',sans-serif; font-size:16px; letter-spacing:1px;\">⚽ TOP 3 GOLEADORES<\u002Fdiv>\n          <button onclick=\"{{ closeRanking }}\" style=\"background:#e0452c; color:#fff; border:2px solid #f2ead8; padding:4px 10px; font-weight:700; font-size:13px; cursor:pointer;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:14px 18px; display:flex; flex-direction:column; gap:2px;\">\n          <div style=\"font-size:11px; color:#555; margin-bottom:8px;\">Selecciones con más goles marcados (sin tandas de penaltis).<\u002Fdiv>\n          <sc-for list=\"{{ goalRanking }}\" as=\"r\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex; align-items:center; gap:12px; padding:9px 10px; border-top:2px solid #111; background:{{ r.bg }};\">\n              <div style=\"font-family:'Archivo Black',sans-serif; font-size:20px; color:{{ r.rankColor }}; width:28px; text-align:center;\">{{ r.rank }}<\u002Fdiv>\n              <div style=\"flex:1; font-weight:700; font-size:15px; color:#111;\">{{ r.name }}<\u002Fdiv>\n              <div style=\"background:#111; color:#7CFC8E; font-family:'Archivo Black',sans-serif; font-size:16px; padding:3px 12px; white-space:nowrap;\">{{ r.gf }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ noGoals }}\" hint-placeholder-v  }}\">\n                    <div style=\"padding:22px 10px; text-align:center; font-size:12px; color:#999; font-weight:700;\">Por definir<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <sc-if value=\"{{ hasChampion }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"background:#ffd23f; border:3px solid #111; box-shadow:4px 4px 0 rgba(0,0,0,0.5); padding:8px 12px; font-family:'Archivo Black',sans-serif; font-size:13px; color:#111; text-align:center;\">{{ championText }}<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <sc-for list=\"{{ bracketRight }}\" as=\"col\" hint-placeholder-count=\"4\">\n                <div style=\"flex:1; display:flex; flex-direction:column; min-width:210px;\">\n                  <div style=\"text-align:center; background:#111; color:#ffd23f; font-family:'Archivo Black',sans-serif; font-size:12px; letter-spacing:1px; padding:6px; margin-bottom:6px;\">{{ col.label }}<\u002Fdiv>\n                  <div style=\"flex:1; display:flex; flex-direction:column;\">\n                    <sc-for list=\"{{ col.slots }}\" as=\"s\" hint-placeholder-count=\"8\">\n                      <div style=\"flex:1; display:flex; align-items:center; position:relative; padding:0 34px;\">\n                        <sc-if value=\"{{ s.showConnR }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div style=\"position:absolute; right:14px; top:25%; height:50%; border-right:2px solid #f2ead8;\"><\u002Fdiv>\n                          <div style=\"position:absolute; right:0; top:25%; width:14px; border-top:2px solid #f2ead8;\"><\u002Fdiv>\n                          <div style=\"position:absolute; right:0; top:75%; width:14px; border-top:2px solid #f2ead8;\"><\u002Fdiv>\n                          <div style=\"position:absolute; right:14px; top:50%; width:20px; border-top:2px solid #f2ead8;\"><\u002Fdiv>\n                        <\u002Fsc-if>\n                        <div style=\"flex:1; background:#f2ead8; border:3px solid #111; box-shadow:3px 3px 0 rgba(0,0,0,0.4); overflow:hidden; max-height:64px;\">\n                          <sc-if value=\"{{ s.isMatch }}\" hint-placeholder-val=\"{{ false }}\">\n                            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:6px; padding:5px 8px; background:{{ s.homeBg }}; border-bottom:2px solid #111;\">\n                              <span style=\"font-size:12px; font-weight:700; color:#111; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ s.homeName }}<\u002Fspan>\n                              <span style=\"font-family:'Archivo Black',sans-serif; font-size:13px; color:#111; white-space:nowrap;\">{{ s.homeScore }}<\u002Fspan>\n                            <\u002Fdiv>\n                            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:6px; padding:5px 8px; background:{{ s.awayBg }};\">\n                              <span style=\"font-size:12px; font-weight:700; color:#111; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ s.awayName }}<\u002Fspan>\n                              <span style=\"font-family:'Archivo Black',sans-serif; font-size:13px; color:#111; white-space:nowrap;\">{{ s.awayScore }}<\u002Fspan>\n                            <\u002Fdiv>\n                          <\u002Fsc-if>\n                          <sc-if value=\"{{ s.isPlaceholder }}\" hint-placeholder-val=\"{{ true }}\">\n                            <div style=\"padding:14px 8px; text-align:center; font-size:11px; color:#999; font-weight:700;\">{{ s.placeholderText }}<\u002Fdiv>\n                          <\u002Fsc-if>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasThird }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#f2ead8; border:4px solid #111; box-shadow:5px 5px 0 #111; padding:10px 16px; font-family:'Archivo Black',sans-serif; font-size:14px; color:#111; text-align:center;\">{{ thirdText }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"font-size:11px; color:#f2ead8; opacity:0.7;\">Los cruces se completan solos: en cuanto se conocen los ganadores de una ronda, se forma el emparejamiento de la siguiente (Ganador A vs Ganador B) y, al jugarse, se añade el marcador. El emparejamiento sigue el orden de los partidos de cada ronda.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ showList }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex; flex-direction:column; gap:16px;\">\n      <sc-for list=\"{{ matchGroups }}\" as=\"g\" hint-placeholder-count=\"2\">\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <button onclick=\"{{ g.onToggle }}\" style=\"width:100%; background:#111; color:#ffd23f; border:3px solid #111; box-shadow:5px 5px 0 rgba(0,0,0,0.35); font-family:'Archivo Black',sans-serif; font-size:clamp(15px,2.4vw,20px); letter-spacing:2px; text-transform:uppercase; padding:12px 18px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:12px; position:relative;\">\n            <span style=\"position:absolute; left:16px; font-size:16px;\">{{ g.chevron }}<\u002Fspan>\n            <span style=\"text-align:center;\">{{ g.label }}<\u002Fspan>\n            <span style=\"position:absolute; right:16px; font-size:11px; color:#f2ead8; opacity:0.6; letter-spacing:1px; font-family:'Space Mono',monospace;\">{{ g.count }}<\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ g.isOpen }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fill, minmax(290px, 1fr)); gap:10px;\">\n              <sc-for list=\"{{ g.list }}\" as=\"m\" hint-placeholder-count=\"4\">\n              <div style=\"background:#f2ead8; border:3px solid #111; box-shadow:4px 4px 0 #111; padding:10px 12px; display:flex; align-items:center; gap:8px;\">\n                <div style=\"flex:1; text-align:right; font-size:13px; font-weight:700; color:#111;\">{{ m.home }}<\u002Fdiv>\n                <div style=\"background:#111; color:#7CFC8E; font-family:'Archivo Black',sans-serif; font-size:16px; padding:4px 10px; white-space:nowrap;\">{{ m.score }}<\u002Fdiv>\n                <div style=\"flex:1; font-size:13px; font-weight:700; color:#111;\">{{ m.away }}<\u002Fdiv>\n                <sc-if value=\"{{ m.editable }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex; gap:4px;\">\n                    <button onclick=\"{{ m.onEdit }}\" style=\"border:2px solid #111; background:#ffd23f; cursor:pointer; font-size:11px; padding:3px 6px;\">✎<\u002Fbutton>\n                    <button onclick=\"{{ m.onDelete }}\" style=\"border:2px solid #111; background:#e0452c; color:#fff; cursor:pointer; font-size:11px; padding:3px 6px;\">✕<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ══════════ JUGADORES ══════════ -->\n  <sc-if value=\"{{ showJugadores }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Porras\" style=\"width:100%; max-width:980px; display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:14px;\">\n      <sc-for list=\"{{ playerCards }}\" as=\"p\" hint-placeholder-count=\"9\">\n        <div style=\"background:#f2ead8; border:4px solid #111; box-shadow:6px 6px 0 #111; display:flex; flex-direction:column;\">\n          <div style=\"background:#0b5226; color:#f2ead8; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; border-bottom:4px solid #111;\">\n            <div style=\"font-family:'Archivo Black',sans-serif; font-size:15px;\">{{ p.pos }}. {{ p.name }}<\u002Fdiv>\n            <div style=\"background:#ffd23f; color:#111; font-family:'Archivo Black',sans-serif; padding:2px 10px; border:2px solid #111; font-size:15px;\">{{ p.total }}<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ p.hasLiveToday }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:{{ p.todayBg }}; color:#111; border-bottom:4px solid #111; padding:6px 14px; display:flex; align-items:center; gap:8px; font-family:'Archivo Black',sans-serif; font-size:11px; letter-spacing:0.5px;\">\n              <span style=\"font-size:11px; animation:{{ p.blinkAnim }};\">{{ p.todayIcon }}<\u002Fspan>\n              <span>{{ p.todayLabel }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"padding:10px 14px; display:flex; flex-direction:column; gap:5px;\">\n            <sc-for list=\"{{ p.picks }}\" as=\"k\" hint-placeholder-count=\"8\">\n              <div style=\"display:flex; align-items:center; gap:8px; font-size:13px; color:#111; background:{{ k.rowBg }}; margin:0 -6px; padding:1px 6px;\">\n                <div style=\"background:#111; color:#f2ead8; font-size:10px; font-weight:700; padding:1px 5px; min-width:14px; text-align:center;\">{{ k.pot }}<\u002Fdiv>\n                <div style=\"flex:1; font-weight:700; text-decoration:{{ k.deco }};\">{{ k.name }}<\u002Fdiv>\n                <sc-if value=\"{{ k.hasMark }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:10px; animation:{{ k.blinkAnim }};\">{{ k.mark }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ k.isPich }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:11px;\">⚽<\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"font-family:'Archivo Black',sans-serif; font-size:13px;\">{{ k.pts }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"border-top:2px dashed #111; margin-top:6px; padding-top:8px; display:flex; flex-direction:column; gap:4px;\">\n              <div style=\"font-size:10px; font-weight:700; letter-spacing:1px; color:#555;\">EXTRAS (+1 GF / GC -1)<\u002Fdiv>\n              <sc-for list=\"{{ p.goles }}\" as=\"gg\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex; align-items:center; gap:8px; font-size:13px; color:#111; background:{{ gg.rowBg }}; margin:0 -6px; padding:1px 6px;\">\n                  <div style=\"flex:1; font-weight:700; text-decoration:{{ gg.deco }};\">{{ gg.name }}<\u002Fdiv>\n                  <sc-if value=\"{{ gg.hasMark }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"font-size:10px; animation:{{ gg.blinkAnim }};\">{{ gg.mark }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <div style=\"font-family:'Archivo Black',sans-serif; color:{{ gg.color }};\">{{ gg.bal }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ p.hasAdj }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex; justify-content:space-between; font-size:12px; color:#e0452c; font-weight:700;\">\n                  <div>AJUSTE<\u002Fdiv>\n                  <div style=\"font-family:'Archivo Black',sans-serif;\">{{ p.adjText }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ══════════ REGLAS ══════════ -->\n  <sc-if value=\"{{ showReglas }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Reglas\" style=\"width:100%; max-width:980px; display:flex; flex-direction:column; gap:16px;\">\n\n      <!-- INTRO -->\n      <div style=\"background:#0b5226; border:4px solid #111; box-shadow:8px 8px 0 #111; padding:18px 20px; color:#f2ead8;\">\n        <div style=\"font-family:'Archivo Black',sans-serif; font-size:18px; margin-bottom:8px;\">📋 NORMAS DE LA PORRA<\u002Fdiv>\n        <div style=\"font-size:14px; line-height:1.6;\">Cada jugador elige <strong>8 selecciones<\u002Fstrong> del Mundial 2026 repartidas entre los bombos de abajo. La suma de los puntos de bombo de esas 8 selecciones debe ser <strong>exactamente 40<\u002Fstrong>. Además se eligen <strong>2 selecciones extra<\u002Fstrong> (una del bombo de 4 pts y otra del de 3 pts). Gana quien más puntos acumule al final del torneo; el ganador se lleva el bote de <strong>{{ bote }}€<\u002Fstrong>.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- BOMBOS -->\n      <div style=\"background:#f2ead8; border:4px solid #111; box-shadow:8px 8px 0 #111; padding:18px 20px;\">\n        <div style=\"font-family:'Archivo Black',sans-serif; font-size:16px; color:#111; margin-bottom:12px;\">LOS BOMBOS<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <sc-for list=\"{{ rulesPots }}\" as=\"pot\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex; gap:12px; align-items:flex-start; border-top:2px solid #111; padding-top:10px;\">\n              <div style=\"background:#e0452c; color:#f2ead8; font-family:'Archivo Black',sans-serif; font-size:14px; padding:4px 10px; border:2px solid #111; white-space:nowrap;\">{{ pot.label }}<\u002Fdiv>\n              <div style=\"font-size:13px; color:#111; line-height:1.7; font-weight:700;\">{{ pot.teams }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- PUNTUACION -->\n      <div style=\"background:#f2ead8; border:4px solid #111; box-shadow:8px 8px 0 #111; padding:18px 20px;\">\n        <div style=\"font-family:'Archivo Black',sans-serif; font-size:16px; color:#111; margin-bottom:12px;\">CÓMO SE PUNTÚA<\u002Fdiv>\n\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:1px; color:#0b5226; margin-bottom:6px;\">POR CADA UNA DE TUS 8 SELECCIONES<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:6px; margin-bottom:16px;\">\n          <div style=\"display:flex; justify-content:space-between; gap:12px; font-size:14px; color:#111; border-bottom:1px dashed #bbae90; padding-bottom:5px;\"><span>Victoria en fase de grupos<\u002Fspan><strong>+3<\u002Fstrong><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; gap:12px; font-size:14px; color:#111; border-bottom:1px dashed #bbae90; padding-bottom:5px;\"><span>Empate en fase de grupos<\u002Fspan><strong>+1<\u002Fstrong><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; gap:12px; font-size:14px; color:#111; border-bottom:1px dashed #bbae90; padding-bottom:5px;\"><span>Pasar la fase de grupos (clasificar a la ronda de 32)<\u002Fspan><strong>+2<\u002Fstrong><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; gap:12px; font-size:14px; color:#111; border-bottom:1px dashed #bbae90; padding-bottom:5px;\"><span>Superar dieciseisavos (ronda de 32)<\u002Fspan><strong>+{{ r32Pts }}<\u002Fstrong><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; gap:12px; font-size:14px; color:#111; border-bottom:1px dashed #bbae90; padding-bottom:5px;\"><span>Superar octavos de final<\u002Fspan><strong>+3<\u002Fstrong><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; gap:12px; font-size:14px; color:#111; border-bottom:1px dashed #bbae90; padding-bottom:5px;\"><span>Superar cuartos de final<\u002Fspan><strong>+3<\u002Fstrong><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; gap:12px; font-size:14px; color:#111; border-bottom:1px dashed #bbae90; padding-bottom:5px;\"><span>Superar semifinal (llegar a la final)<\u002Fspan><strong>+3<\u002Fstrong><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; gap:12px; font-size:14px; color:#111; border-bottom:1px dashed #bbae90; padding-bottom:5px;\"><span>Ganar la final (campeón del Mundial)<\u002Fspan><strong>+3<\u002Fstrong><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; gap:12px; font-size:14px; color:#111;\"><span>Ganar el partido por el tercer puesto<\u002Fspan><strong>+1<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:1px; color:#0b5226; margin-bottom:6px;\">BONIFICACIONES ESPECIALES<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:6px;\">\n          <div style=\"display:flex; justify-content:space-between; gap:12px; font-size:14px; color:#111; border-bottom:1px dashed #bbae90; padding-bottom:5px;\"><span>Tener la <strong>selección pichichi<\u002Fstrong> entre tus 8 (la que más goles marque en total)<\u002Fspan><strong>+2<\u002Fstrong><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; gap:12px; font-size:14px; color:#111;\"><span>Cada gol a favor de una <strong>selección extra<\u002Fstrong> suma / cada gol en contra resta<\u002Fspan><strong>±1<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ACLARACIONES -->\n      <div style=\"background:#ffd23f; border:4px solid #111; box-shadow:8px 8px 0 #111; padding:18px 20px;\">\n        <div style=\"font-family:'Archivo Black',sans-serif; font-size:16px; color:#111; margin-bottom:12px;\">ACLARACIONES<\u002Fdiv>\n        <ul style=\"margin:0; padding-left:20px; font-size:14px; color:#111; line-height:1.7;\">\n          <li><strong>Selección pichichi:<\u002Fstrong> es la selección que más goles marque sumando los de todos sus jugadores a lo largo del torneo, <strong>sin contar las tandas de penaltis<\u002Fstrong>. Los +2 los reciben todos los jugadores que la tengan entre sus 8 selecciones; si hay empate a goles entre varias selecciones, todas cuentan como pichichi.<\u002Fli>\n          <li><strong>Selecciones extra:<\u002Fstrong> son 2 selecciones adicionales (una del bombo de 4 pts y otra del de 3 pts) que <strong>no forman parte de las 8<\u002Fstrong>. Solo cuentan sus goles: cada gol a favor suma 1 punto y cada gol en contra resta 1 punto, durante todo su recorrido en el torneo. <strong>No cuentan los goles de las tandas de penaltis.<\u002Fstrong><\u002Fli>\n          <li><strong>Pasar de ronda:<\u002Fstrong> se puntúa por superar cada eliminatoria, gane la selección en tiempo reglamentario, prórroga o en la tanda de penaltis. Pasar en penaltis puntúa igual que ganar el partido.<\u002Fli>\n          <li><strong>Los penaltis de las tandas nunca cuentan como goles<\u002Fstrong> ni para el pichichi ni para las selecciones extra: solo sirven para decidir quién pasa de ronda.<\u002Fli>\n          <li><strong>Suma de bombos:<\u002Fstrong> las 8 selecciones deben sumar exactamente 40 puntos de bombo. Ni más ni menos.<\u002Fli>\n          <li><strong>Subcampeón:<\u002Fstrong> perder la final no otorga puntos adicionales (más allá de los ya sumados por llegar a ella).<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ══════════ ADMIN ══════════ -->\n  <sc-if value=\"{{ showAdmin }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Admin\" style=\"width:100%; max-width:980px; display:flex; flex-direction:column; gap:16px;\">\n\n      <sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:contents;\">\n\n          <!-- API -->\n          <div style=\"background:#f2ead8; border:4px solid #111; box-shadow:8px 8px 0 #111; padding:16px;\">\n            <div style=\"font-family:'Archivo Black',sans-serif; font-size:15px; color:#111; margin-bottom:8px;\">RESULTADOS AUTOMÁTICOS (API)<\u002Fdiv>\n            <div style=\"font-size:12px; color:#333; margin-bottom:10px;\">Intenta descargar los resultados del Mundial 2026 desde TheSportsDB. Revisa las fases tras importar y añade los penaltis a mano. Si falla, usa la entrada manual en Partidos.<\u002Fdiv>\n            <div style=\"display:flex; gap:10px; align-items:center; flex-wrap:wrap;\">\n              <button onclick=\"{{ syncApi }}\" style=\"background:#1c5fae; color:#fff; border:3px solid #111; box-shadow:3px 3px 0 #111; padding:9px 16px; font-weight:700; font-size:13px; cursor:pointer;\">SINCRONIZAR API<\u002Fbutton>\n              <div style=\"font-size:12px; font-weight:700; color:#111;\">{{ apiStatus }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- JUGADORES -->\n          <div style=\"background:#f2ead8; border:4px solid #111; box-shadow:8px 8px 0 #111; padding:16px;\">\n            <div style=\"font-family:'Archivo Black',sans-serif; font-size:15px; color:#111; margin-bottom:10px;\">JUGADORES Y ELECCIONES<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:8px;\">\n              <sc-for list=\"{{ adminPlayers }}\" as=\"ap\" hint-placeholder-count=\"9\">\n                <div style=\"display:flex; gap:8px; align-items:center; flex-wrap:wrap;\">\n                  <input value=\"{{ ap.name }}\" onchange=\"{{ ap.onRename }}\" style=\"border:3px solid #111; padding:6px 10px; font-size:13px; font-weight:700; width:170px;\">\n                  <label style=\"display:flex; align-items:center; gap:4px; font-size:10px; font-weight:700; color:#111;\">AJUSTE\n                    <input type=\"number\" value=\"{{ ap.adj }}\" onchange=\"{{ ap.onAdj }}\" style=\"border:3px solid #111; padding:6px; width:52px; font-size:12px;\">\n                  <\u002Flabel>\n                  <div style=\"font-size:12px; color:{{ ap.statusColor }}; font-weight:700; flex:1; min-width:180px;\">{{ ap.status }}<\u002Fdiv>\n                  <button onclick=\"{{ ap.onEditPicks }}\" style=\"background:#ffd23f; border:3px solid #111; box-shadow:3px 3px 0 #111; padding:6px 12px; font-weight:700; font-size:12px; cursor:pointer;\">EDITAR PICKS<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- ELIMINADAS -->\n          <div style=\"background:#f2ead8; border:4px solid #111; box-shadow:8px 8px 0 #111; padding:16px;\">\n            <div style=\"font-family:'Archivo Black',sans-serif; font-size:15px; color:#111; margin-bottom:6px;\">MARCAR SELECCIONES ELIMINADAS<\u002Fdiv>\n            <div style=\"font-size:12px; color:#333; margin-bottom:10px;\">Las selecciones que pierden una eliminatoria se marcan solas. Aquí puedes marcar a mano las que queden fuera en la fase de grupos (o corregir). Una selección eliminada aparece tachada en la pestaña Jugadores.<\u002Fdiv>\n            <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n              <sc-for list=\"{{ elimTeams }}\" as=\"et\" hint-placeholder-count=\"8\">\n                <button onclick=\"{{ et.onToggle }}\" style=\"display:flex; flex-direction:column; align-items:center; gap:2px; border:3px solid #111; box-shadow:3px 3px 0 #111; padding:6px 10px; cursor:pointer; background:{{ et.bg }}; color:{{ et.fg }};\">\n                  <span style=\"font-size:13px; font-weight:700;\">{{ et.name }}<\u002Fspan>\n                  <span style=\"font-size:9px; letter-spacing:1px;\">{{ et.label }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- EDITOR DE PICKS -->\n          <sc-if value=\"{{ showEditor }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#fff; border:4px solid #111; box-shadow:8px 8px 0 #111; padding:16px;\">\n              <div style=\"display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:10px;\">\n                <div style=\"font-family:'Archivo Black',sans-serif; font-size:15px; color:#111;\">PICKS DE {{ editorName }}<\u002Fdiv>\n                <div style=\"font-size:13px; font-weight:700; color:{{ editorSumColor }};\">{{ editorSummary }}<\u002Fdiv>\n                <button onclick=\"{{ closeEditor }}\" style=\"background:#111; color:#fff; border:3px solid #111; padding:6px 12px; font-weight:700; font-size:12px; cursor:pointer;\">CERRAR<\u002Fbutton>\n              <\u002Fdiv>\n              <sc-for list=\"{{ editorPots }}\" as=\"pot\" hint-placeholder-count=\"6\">\n                <div style=\"margin-bottom:10px;\">\n                  <div style=\"font-size:11px; font-weight:700; letter-spacing:1px; color:#555; margin-bottom:5px;\">BOMBO {{ pot.label }} PTS<\u002Fdiv>\n                  <div style=\"display:flex; flex-wrap:wrap; gap:6px;\">\n                    <sc-for list=\"{{ pot.teams }}\" as=\"tt\" hint-placeholder-count=\"6\">\n                      <button onclick=\"{{ tt.onToggle }}\" style=\"border:2px solid #111; padding:4px 9px; font-size:12px; font-weight:700; cursor:pointer; background:{{ tt.bg }}; color:{{ tt.fg }};\">{{ tt.name }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"border-top:2px dashed #111; padding-top:12px; display:flex; gap:14px; flex-wrap:wrap;\">\n                <label style=\"display:flex; flex-direction:column; gap:4px; font-size:11px; font-weight:700; color:#111;\">GOLEADOR BOMBO 4\n                  <select value=\"{{ editorGol4 }}\" onchange=\"{{ setGol4 }}\" style=\"border:3px solid #111; padding:7px; background:#fff; font-size:13px;\">\n                    <option value=\"\">—<\u002Foption>\n                    \n                      <option value=\"{{ o.id }}\">{{ o.label }}<\u002Foption>\n                    \n                  <\u002Fselect>\n                <\u002Flabel>\n                <label style=\"display:flex; flex-direction:column; gap:4px; font-size:11px; font-weight:700; color:#111;\">GOLEADOR BOMBO 3\n                  <select value=\"{{ editorGol3 }}\" onchange=\"{{ setGol3 }}\" style=\"border:3px solid #111; padding:7px; background:#fff; font-size:13px;\">\n                    <option value=\"\">—<\u002Foption>\n                    \n                      <option value=\"{{ o.id }}\">{{ o.label }}<\u002Foption>\n                    \n                  <\u002Fselect>\n                <\u002Flabel>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- DATOS -->\n          <div style=\"background:#f2ead8; border:4px solid #111; box-shadow:8px 8px 0 #111; padding:16px;\">\n            <div style=\"font-family:'Archivo Black',sans-serif; font-size:15px; color:#111; margin-bottom:8px;\">COPIA DE SEGURIDAD<\u002Fdiv>\n            <div style=\"display:flex; gap:10px; flex-wrap:wrap; align-items:center;\">\n              <button onclick=\"{{ exportData }}\" style=\"background:#0b5226; color:#f2ead8; border:3px solid #111; box-shadow:3px 3px 0 #111; padding:9px 16px; font-weight:700; font-size:13px; cursor:pointer;\">EXPORTAR JSON<\u002Fbutton>\n              <label style=\"background:#fff; border:3px solid #111; box-shadow:3px 3px 0 #111; padding:9px 16px; font-weight:700; font-size:13px; cursor:pointer; color:#111;\">IMPORTAR JSON\n                <input type=\"file\" accept=\".json\" onchange=\"{{ importData }}\" style=\"display:none;\">\n              <\u002Flabel>\n              <button onclick=\"{{ changePass }}\" style=\"background:#111; color:#ffd23f; border:3px solid #111; box-shadow:3px 3px 0 #111; padding:9px 16px; font-weight:700; font-size:13px; cursor:pointer;\">CAMBIAR CONTRASEÑA<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ notAdmin }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#f2ead8; border:4px solid #111; box-shadow:8px 8px 0 #111; padding:30px; display:flex; flex-direction:column; gap:14px; align-items:center; text-align:center;\">\n          <div style=\"font-family:'Archivo Black',sans-serif; font-size:18px; color:#111;\">🔒 ACCESO A MODO ADMIN<\u002Fdiv>\n          <div style=\"font-size:13px; font-weight:700; color:#333; max-width:440px;\">Introduce la contraseña para gestionar jugadores, picks y resultados.<\u002Fdiv>\n          <div style=\"display:flex; gap:8px; flex-wrap:wrap; justify-content:center;\">\n            <input type=\"password\" value=\"{{ adminInput }}\" onchange=\"{{ setAdminInput }}\" onkeydown=\"{{ loginKeyDown }}\" placeholder=\"Contraseña\" style=\"border:3px solid #111; box-shadow:3px 3px 0 #111; padding:9px 14px; font-size:14px; font-weight:700; width:220px;\">\n            <button onclick=\"{{ doLogin }}\" style=\"background:#e0452c; color:#f2ead8; border:3px solid #111; box-shadow:3px 3px 0 #111; padding:9px 18px; font-family:'Archivo Black',sans-serif; font-size:13px; letter-spacing:0.5px; cursor:pointer;\">ENTRAR<\u002Fbutton>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasLoginError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:13px; font-weight:700; color:#e0452c;\">{{ adminError }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"font-size:11px; color:#f2ead8; opacity:0.7; max-width:980px; text-align:center;\">Reglas: grupos +3 victoria / +1 empate · pase de grupos +2 · dieciseisavos, octavos, cuartos y semis superados +3 · campeón +3 · tercero +1 · selección pichichi +2 · goleadores ±1 por gol (sin tandas de penaltis)<\u002Fdiv>\n  <div style=\"font-size:10px; color:#f2ead8; opacity:0.45; letter-spacing:1px;\">v2.5 · 05/07/2026<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;boteEuros&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 18, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Porra&quot;}, &quot;puntosDieciseisavos&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 3, &quot;min&quot;: 0, &quot;max&quot;: 5, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Reglas&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.KEY = 'porra-mundialista-asamblea-v2';\n    this.TEAMS = [\n      ['arg','Argentina',9,'🇦🇷'],['esp','España',9,'🇪🇸'],['fra','Francia',9,'🇫🇷'],\n      ['ale','Alemania',8,'🇩🇪'],['ing','Inglaterra',8,'🏴󠁧󠁢󠁥󠁮󠁧󠁿'],['por','Portugal',8,'🇵🇹'],\n      ['ned','Países Bajos',7,'🇳🇱'],['bra','Brasil',7,'🇧🇷'],['mar','Marruecos',7,'🇲🇦'],\n      ['col','Colombia',5,'🇨🇴'],['uru','Uruguay',5,'🇺🇾'],['bel','Bélgica',5,'🇧🇪'],['ecu','Ecuador',5,'🇪🇨'],['cro','Croacia',5,'🇭🇷'],['sen','Senegal',5,'🇸🇳'],\n      ['mex','México',4,'🇲🇽'],['usa','Estados Unidos',4,'🇺🇸'],['jpn','Japón',4,'🇯🇵'],['sui','Suiza',4,'🇨🇭'],['tur','Turquía',4,'🇹🇷'],['kor','Corea del Sur',4,'🇰🇷'],['nor','Noruega',4,'🇳🇴'],['sco','Escocia',4,'🏴󠁧󠁢󠁳󠁣󠁴󠁿'],['par','Paraguay',4,'🇵🇾'],['aut','Austria',4,'🇦🇹'],['cze','República Checa',4,'🇨🇿'],['swe','Suecia',4,'🇸🇪'],['bih','Bosnia y Herzegovina',4,'🇧🇦'],\n      ['can','Canadá',3,'🇨🇦'],['ksa','Arabia Saudí',3,'🇸🇦'],['aus','Australia',3,'🇦🇺'],['irn','Irán',3,'🇮🇷'],['rsa','Sudáfrica',3,'🇿🇦'],['tun','Túnez',3,'🇹🇳'],['egy','Egipto',3,'🇪🇬'],['alg','Argelia',3,'🇩🇿'],['gha','Ghana',3,'🇬🇭'],['pan','Panamá',3,'🇵🇦'],['nzl','Nueva Zelanda',3,'🇳🇿'],['qat','Qatar',3,'🇶🇦'],['irq','Irak',3,'🇮🇶'],['jor','Jordania',3,'🇯🇴'],['uzb','Uzbekistán',3,'🇺🇿'],['hai','Haití',3,'🇭🇹'],['cur','Curazao',3,'🇨🇼'],['cpv','Cabo Verde',3,'🇨🇻'],['cod','RD Congo',3,'🇨🇩'],['civ','Costa de Marfil',3,'🇨🇮']\n    ].map(t => ({ id: t[0], name: t[1], pot: t[2], flag: t[3] }));\n    this.TEAM_MAP = {}; this.TEAMS.forEach(t => this.TEAM_MAP[t.id] = t);\n    // Selecciones que quedan permanentemente eliminadas (siembra única en la BD compartida)\n    this.ELIM_SEED_VERSION = 'wc26-fuera-2';\n    this.DEFAULT_ELIM = ['ksa','alg','aus','can','civ','cro','ecu','sco','gha','irq','irn','jpn','nzl','ned','pan','par','rsa','swe','tun','tur','uru','uzb'];\n    // Selecciones que la siembra debe DEVOLVER a activas (corrige errores previos)\n    this.FORCE_ACTIVE = ['nor'];\n    this.API_NAMES = { 'argentina':'arg','spain':'esp','france':'fra','germany':'ale','england':'ing','portugal':'por','netherlands':'ned','holland':'ned','brazil':'bra','morocco':'mar','colombia':'col','uruguay':'uru','belgium':'bel','ecuador':'ecu','croatia':'cro','senegal':'sen','mexico':'mex','usa':'usa','united states':'usa','japan':'jpn','switzerland':'sui','turkey':'tur','turkiye':'tur','south korea':'kor','korea republic':'kor','norway':'nor','scotland':'sco','paraguay':'par','austria':'aut','czech republic':'cze','czechia':'cze','sweden':'swe','bosnia and herzegovina':'bih','canada':'can','saudi arabia':'ksa','australia':'aus','iran':'irn','south africa':'rsa','tunisia':'tun','egypt':'egy','algeria':'alg','ghana':'gha','panama':'pan','new zealand':'nzl','qatar':'qat','iraq':'irq','jordan':'jor','uzbekistan':'uzb','haiti':'hai','curacao':'cur','cape verde':'cpv','dr congo':'cod','congo dr':'cod','ivory coast':'civ',\"cote d'ivoire\":'civ','democratic republic of the congo':'cod' };\n    this.STAGES = [\n      { id:'grupos', label:'FASE DE GRUPOS' },\n      { id:'dieciseisavos', label:'DIECISEISAVOS (RONDA DE 32)' },\n      { id:'octavos', label:'OCTAVOS DE FINAL' },\n      { id:'cuartos', label:'CUARTOS DE FINAL' },\n      { id:'semifinal', label:'SEMIFINALES' },\n      { id:'tercer_puesto', label:'TERCER PUESTO' },\n      { id:'final', label:'FINAL' }\n    ];\n    const SEED = [\n      ['Denis', ['esp','fra','col','bel','egy','ksa','tun','alg'], 'nor', 'gha', 0],\n      ['Ana', ['esp','por','uru','nor','col','irn','nzl','egy'], 'mex', 'irq', 0],\n      ['Anne', ['esp','ing','bra','usa','can','aus','egy','civ'], 'nor', 'pan', 0],\n      ['Lobato', ['por','bel','cro','uru','ned','jpn','sui'], 'nor', 'aus', -2],\n      ['Claudio', ['esp','por','col','jpn','sco','swe','gha','egy'], 'sui', 'rsa', 0],\n      ['Elena', ['esp','ing','col','bel','nor','egy','rsa','can'], 'tur', 'alg', 0],\n      ['Jorge', ['esp','por','ecu','tur','sui','mex','egy','alg'], 'par', 'can', 0],\n      ['Dani', ['esp','por','ned','jpn','can','aus','irn','civ'], 'usa', 'uzb', 0],\n      ['Anya', ['esp','bra','bel','uru','jpn','sui','irn','can'], 'mex', 'civ', 0]\n    ];\n    let data = null;\n    try { data = JSON.parse(localStorage.getItem(this.KEY)); } catch (e) {}\n    if (!data || !data.players) {\n      data = {\n        players: SEED.map((s, i) => ({ id: 'p' + (i + 1), name: s[0], picks: s[1], gol4: s[2], gol3: s[3], adj: s[4] })),\n        matches: []\n      };\n      try {\n        const old = JSON.parse(localStorage.getItem('porra-mundialista-asamblea-v1'));\n        if (old && old.matches && old.matches.length) data.matches = old.matches;\n      } catch (e) {}\n    }\n    this.sanitizeRank(data);\n    this.ensureBaseline(data);\n    this.applyElimSeed(data);\n    this.state = {\n      data: data, tab: 'clas', admin: false, editPlayerId: null, apiStatus: '', stageOpen: {}, matchView: 'lista',\n      form: { editing: null, stage: 'grupos', home: '', away: '', hg: '', ag: '', hp: '', ap: '' },\n      formError: ''\n    };\n  }\n\n  // ¿es una foto \"degenerada\"? (casi todos empatados en el mismo puesto: p.ej. arranque a 0)\n  // Una base así hace que al repartirse los puntos \"caigan\" todos a la vez -> flechas falsas.\n  isDegenerateRank(pos) {\n    if (!pos) return true;\n    const vals = Object.values(pos);\n    if (vals.length < 4) return false;\n    return new Set(vals).size <= 2;\n  }\n\n  // limpia una base de flechas inservible dentro de un objeto data\n  sanitizeRank(data) {\n    if (data && data.rankBefore && this.isDegenerateRank(data.rankBefore)) {\n      delete data.rankBefore; delete data.rankStamp;\n    }\n    return data;\n  }\n\n  // \"toma la foto\": si no hay referencia válida, guarda la clasificación actual como base de las flechas\n  ensureBaseline(data) {\n    if (data && data.players && data.players.length && !data.rankBefore) {\n      data.rankBefore = this.rankPositions(data);\n      data.rankStamp = Date.now();\n    }\n    return data;\n  }\n\n  // posiciones (playerId -> puesto) para una foto de la clasificación dada\n  rankPositions(data) {\n    const comp = this.computeStats(data);\n    const rows = data.players.map(p => ({ id: p.id, total: this.playerCalc(p, comp).total }));\n    rows.sort((a, b) => b.total - a.total);\n    const pos = {}, sp = [];\n    rows.forEach((r, i) => { const p = i === 0 ? 1 : (rows[i - 1].total === r.total ? sp[i - 1] : sp[i - 1] + 1); sp.push(p); pos[r.id] = p; });\n    return pos;\n  }\n\n  save(data) {\n    // flechas ▲/▼: guarda la clasificación previa cuando el cambio altera puestos\n    try {\n      const before = this.rankPositions(this.state.data);\n      const after = this.rankPositions(data);\n      let changed = false;\n      for (const id in after) { if (before[id] !== after[id]) { changed = true; break; } }\n      if (changed && !this.isDegenerateRank(before)) { data.rankBefore = before; data.rankStamp = Date.now(); }\n      else if (this.state.data.rankBefore && !this.isDegenerateRank(this.state.data.rankBefore)) { data.rankBefore = this.state.data.rankBefore; data.rankStamp = this.state.data.rankStamp; }\n    } catch (e) {}\n    data = Object.assign({}, data, { updatedAt: Date.now() });\n    this.setState({ data: data });\n    try { localStorage.setItem(this.KEY, JSON.stringify(data)); } catch (e) {}\n    this.pushRemote(data);\n  }\n\n  pushRemote(data) {\n    if (!this.dbRef) return;\n    this._lastWrite = data.updatedAt;\n    try { this.dbRef.set(data).catch(() => {}); } catch (e) {}\n  }\n\n  // Firebase puede devolver un array como objeto {0:..,1:..}; norm. siempre a array\n  asArr(v) {\n    if (Array.isArray(v)) return v;\n    if (v && typeof v === 'object') return Object.keys(v).sort((a,b)=>a-b).map(k => v[k]);\n    return [];\n  }\n\n  // Siembra única: fuerza como eliminadas las selecciones DEFAULT_ELIM. Devuelve true si cambió.\n  applyElimSeed(data) {\n    if (!data || data.elimSeeded === this.ELIM_SEED_VERSION) return false;\n    const set = new Set(this.asArr(data.eliminated));\n    this.DEFAULT_ELIM.forEach(id => set.add(id));\n    (this.FORCE_ACTIVE || []).forEach(id => set.delete(id));\n    data.eliminated = Array.from(set);\n    data.elimSeeded = this.ELIM_SEED_VERSION;\n    return true;\n  }\n\n  // El auto-sync SOLO es dueño de los partidos y del estado \"en directo\".\n  // Fusiona esos campos sobre el estado MÁS RECIENTE (this.state.data) para no\n  // pisar cambios de otros clientes (p.ej. selecciones eliminadas a mano).\n  mergeSyncFields(synced) {\n    return Object.assign({}, this.state.data, {\n      matches: synced.matches,\n      liveMatches: synced.liveMatches,\n      todayTeamIds: synced.todayTeamIds,\n      liveTeamIds: synced.liveTeamIds,\n      lastApiSync: synced.lastApiSync\n    });\n  }\n\n  componentDidMount() {\n    this.FIREBASE_CONFIG = {\n      apiKey: \"AIzaSyDUUNry6ajoqPtVnGSgXJ9UYU9FoyGhazI\",\n      authDomain: \"porra-asamblea.firebaseapp.com\",\n      databaseURL: \"https://porra-asamblea-default-rtdb.europe-west1.firebasedatabase.app\",\n      projectId: \"porra-asamblea\",\n      storageBucket: \"porra-asamblea.firebasestorage.app\",\n      messagingSenderId: \"508767146203\",\n      appId: \"1:508767146203:web:c5fb1a087845e8e13b7cfe\"\n    };\n    let tries = 0;\n    const boot = () => {\n      if (typeof window.firebase === 'undefined' || !window.firebase.database) {\n        if (tries++ < 60) return setTimeout(boot, 250);\n        this.setState({ syncStatus: 'offline' });\n        return;\n      }\n      try {\n        if (!window.firebase.apps.length) window.firebase.initializeApp(this.FIREBASE_CONFIG);\n        this.db = window.firebase.database();\n        this.dbRef = this.db.ref('porra/sta
